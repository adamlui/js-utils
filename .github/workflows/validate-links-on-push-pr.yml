name: Validate links on push + PR

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linkinator:
    if: ${{ github.event.head_commit.author.name != 'kudo-sync-bot' }} # skip auto bump commits containing future links
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: JustinBeckwith/linkinator-action@b01779287d9a8423ef7d222fb1c3ba5a2b11ac58 # v2.4.4
        with:
          paths: '**/*.md'
          statusCodes: '{ "403": "skip", "408": "skip", "429": "skip" }'
          linksToSkip: '^https://assets\\.(?:bravegpt\\.com|chatgptjs\\.org)(?:/|$)'
