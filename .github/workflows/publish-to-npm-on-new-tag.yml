name: Publish to NPM on new tag

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: ${{
           !contains(github.event.release.tag_name, 'ai-personas')
        && !contains(github.event.release.tag_name, 'chatgpt.js')
        && !contains(github.event.release.tag_name, 'minify')
        && !contains(github.event.release.tag_name, 'scss-to-css')
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - run: |
          TAG="${{ github.event.release.tag_name }}"
          PROJECT="${TAG%-*}"
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: |
          cd ${{ env.PROJECT }} && npm ci && npm run build && npm publish --provenance
