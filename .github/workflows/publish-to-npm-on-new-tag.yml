name: Publish to NPM on new tag

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: ${{
           !contains(github.event.release.tag_name, 'ai-personas')
        && !contains(github.event.release.tag_name, 'chatgpt.js')
        && !contains(github.event.release.tag_name, 'minify')
        && !contains(github.event.release.tag_name, 'scss-to-css')
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - run: |
          TAG="${{ github.event.release.tag_name }}"
          PROJECT="${TAG%-*}"
          echo "PROJECT=$PROJECT" >> $GITHUB_ENV
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: |
          cd ${{ env.PROJECT }} && npm ci && npm run build && npm publish --provenance
