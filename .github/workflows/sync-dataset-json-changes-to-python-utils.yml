name: Sync <dataset>/**/<dataset>.json → adamlui/python-utils/<dataset>

on:
  push:
    branches: [main]
    paths:
      - "**/computer-languages.json"
      - "**/data-languages.json"
      - "**/latin-locales.json"
      - "**/markup-languages.json"
      - "**/non-latin-locales.json"
      - "**/project-markers.json"
      - "**/programming-languages.json"
      - "**/prose-languages.json"

jobs:
  build:
    if: (github.repository == 'adamlui/js-utils') && !contains(github.event.head_commit.message, '[auto-sync')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TZ: PST8PDT

    steps:

      - name: Checkout adamlui/js-utils
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: adamlui/js-utils
          fetch-depth: 2

      - name: Checkout adamlui/python-utils
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          repository: adamlui/python-utils
          path: adamlui/python-utils

      - name: Determine changed dataset
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          changed_file=$(gh api repos/$REPO/commits/$SHA | grep '"filename":' | head -n 1 | sed -E 's/.*"filename": "(.*)".*/\1/')
          dataset=$(basename "$changed_file" .json)
          echo "DATASET=$dataset" >> $GITHUB_ENV
          echo "Extracted dataset: $dataset"

      - name: Sync each <dataset>.json → adamlui/python-utils/<dataset>
        run: |
          for dataset in ${{ env.DATASETS }} ; do
            echo "Syncing $dataset.json"
            src_file=$(find ${{ github.workspace }}/adamlui/js-utils -name "$dataset.json" -type f | head -n 1)
            if [[ -z "$src_file" ]] ; then
              echo "No source file found for $dataset"
              exit 1
            fi
            dest_dir="${{ github.workspace }}/adamlui/python-utils/$dataset"
            mkdir -p "$dest_dir"
            cp -f "$src_file" "$dest_dir/$dataset.json"
          done

      - name: Escape backticks in commit msg
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DELIM="EOF_$(uuidgen)"
          echo "ESCAPED_MSG<<$DELIM" >> "$GITHUB_ENV"
          echo "$COMMIT_MSG" | sed 's/`/\`/g' >> "$GITHUB_ENV"
          echo "$DELIM" >> "$GITHUB_ENV"

      - name: Config committer
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_ID: ${{ secrets.GPG_PRIVATE_ID }}
        run: |
          gpg --batch --import <(echo "$GPG_PRIVATE_KEY")
          git config --global commit.gpgsign true
          git config --global user.name "kudo-sync-bot"
          git config --global user.email "auto-sync@kudoai.com"
          git config --global user.signingkey "$GPG_PRIVATE_ID"

      - name: Push changes to adamlui/python-utils
        run: |
          cd ${{ github.workspace }}/adamlui/python-utils
          git add . && git commit -n -m \
            "$ESCAPED_MSG ↞ [auto-sync from https://github.com/adamlui/js-utils/tree/main]" || true
          git pull --rebase
          git push
